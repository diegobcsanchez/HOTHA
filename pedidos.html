<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Pedido — Hotha Global Logistics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #2d3a5e; --gold: #c9a84c; --gold-light: #e8c96a;
    --bg: #f4f6fa; --card: #ffffff; --border: #dde2ef;
    --text: #1a2340; --muted: #7a849e; --input-bg: #f8f9fc;
    --coleta-bg: #f0f7f0; --coleta-border: #b8d9b8;
    --entrega-bg: #f0f4ff; --entrega-border: #b8c8ef;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px 48px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; box-shadow: 0 4px 24px rgba(45,58,94,0.08); overflow: hidden; }
  .header { background: var(--navy); padding: 22px 28px; display: flex; align-items: center; gap: 16px; }
  .header-text h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; color: #fff; line-height: 1.1; }
  .header-text p { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
  .body { padding: 24px 28px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: #eef1f8; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 20px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .field-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
  input { width: 100%; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 10px 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(45,58,94,0.08); }
  input::placeholder { color: #c0c8d8; }
  .row { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }
  .section-wrap { margin-bottom: 12px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .section-label.coleta { color: #3a7a3a; }
  .section-label.entrega { color: var(--navy); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .entries { display: flex; flex-direction: column; gap: 8px; }
  .entry { border-radius: 10px; padding: 12px; position: relative; }
  .entry.coleta { background: var(--coleta-bg); border: 1.5px solid var(--coleta-border); }
  .entry.entrega { background: var(--entrega-bg); border: 1.5px solid var(--entrega-border); }
  .entry-num { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .remove-btn { position: absolute; top: 10px; right: 10px; background: #fff; border: 1.5px solid #ddd; color: #aaa; border-radius: 5px; width: 22px; height: 22px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; padding: 0; }
  .remove-btn:hover { border-color: #e53935; color: #e53935; }
  .add-btn { background: transparent; border: 1.5px dashed; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; padding: 8px 14px; cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 6px; }
  .add-btn.coleta { border-color: #b8d9b8; color: #3a7a3a; }
  .add-btn.coleta:hover { background: var(--coleta-bg); }
  .add-btn.entrega { border-color: var(--entrega-border); color: var(--navy); }
  .add-btn.entrega:hover { background: var(--entrega-bg); }
  .btn { width: 100%; background: var(--gold); color: #fff; border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 14px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 6px; box-shadow: 0 4px 14px rgba(201,168,76,0.3); }
  .btn:hover { background: var(--gold-light); }
  .btn:active { transform: scale(0.98); }
  .result-box { display: none; margin-top: 16px; background: #f8f9fc; border: 1.5px solid var(--gold); border-radius: 10px; padding: 16px; }
  .result-box.show { display: block; }
  .result-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .result-text { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); line-height: 2; white-space: pre-line; font-weight: 500; }
  .copy-btn { width: 100%; background: var(--navy); border: none; color: #fff; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 11px; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
  .copy-btn:hover { background: #3d4f7a; }
  .copy-btn.copied { background: #2e7d32; }
  .footer { text-align: center; padding: 12px 28px 20px; font-size: 11px; color: var(--muted); }

  .btn-enviar { width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 14px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 10px; box-shadow: 0 4px 14px rgba(45,58,94,0.2); display: none; }
  .btn-enviar:hover { background: #3d4f7a; }
  .btn-enviar:active { transform: scale(0.98); }
  .btn-enviar.show { display: block; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
  .modal-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .modal-data { background: #f8f9fc; border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 2; white-space: pre-line; color: var(--text); font-weight: 500; margin-bottom: 16px; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-cancel { background: #f4f6fa; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; padding: 12px; cursor: pointer; transition: background 0.2s; }
  .modal-cancel:hover { background: #e8eaf0; }
  .modal-confirm { background: var(--navy); border: none; color: #fff; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; padding: 12px; cursor: pointer; transition: background 0.2s; }
  .modal-confirm:hover { background: #3d4f7a; }
  .modal-confirm.loading { opacity: 0.6; pointer-events: none; }
  .modal-success { text-align: center; padding: 10px 0; }
  .modal-success .icon { font-size: 40px; margin-bottom: 8px; }
  .modal-success p { font-size: 14px; color: var(--green, #2e7d32); font-weight: 700; }
</style>
</head>

<script>
  function formatarValor(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; return; }
    let intPart = v.slice(0, -2) || '0';
    let decPart = v.slice(-2).padStart(2, '0');
    intPart = intPart.replace(/^0+/, '') || '0';
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    input.value = intPart + ',' + decPart;
  }

  let coletaCount = 0, entregaCount = 0;
  function addEntry(tipo) {
    const container = document.getElementById(tipo + 's');
    const isColeta = tipo === 'coleta';
    const count = isColeta ? ++coletaCount : ++entregaCount;
    const id = tipo + '_' + count;
    const total = container.querySelectorAll('.entry').length + 1;
    const div = document.createElement('div');
    div.className = 'entry ' + tipo;
    div.id = 'entry_' + id;
    div.innerHTML = `
      <div class="entry-num">${isColeta ? 'Coleta' : 'Entrega'} ${total}</div>
      ${total > 1 ? `<button class="remove-btn" onclick="removeEntry('entry_${id}', '${tipo}')" title="Remover">✕</button>` : ''}
      <div class="row">
        <div class="field-group" style="margin:0"><label>Cidade</label><input type="text" id="${id}_cidade" placeholder="Ex: ERECHIM" style="text-transform:uppercase"></div>
        <div class="field-group" style="margin:0"><label>UF</label><input type="text" id="${id}_uf" placeholder="RS" maxlength="2"></div>
      </div>`;
    container.appendChild(div);
    document.getElementById(id + '_uf').addEventListener('input', function() { this.value = this.value.toUpperCase(); });
    updateNumbers(tipo);
  }
  function removeEntry(entryId, tipo) { document.getElementById(entryId)?.remove(); updateNumbers(tipo); }
  function updateNumbers(tipo) {
    const entries = document.getElementById(tipo + 's').querySelectorAll('.entry');
    const label = tipo === 'coleta' ? 'Coleta' : 'Entrega';
    entries.forEach((entry, i) => {
      entry.querySelector('.entry-num').textContent = `${label} ${i + 1}`;
      const rb = entry.querySelector('.remove-btn');
      if (i === 0) { if (rb) rb.remove(); }
      else if (!rb) {
        const btn = document.createElement('button');
        btn.className = 'remove-btn'; btn.title = 'Remover'; btn.textContent = '✕';
        btn.onclick = () => removeEntry(entry.id, tipo);
        entry.insertBefore(btn, entry.querySelector('.entry-num').nextSibling);
      }
    });
  }
  function getValues(tipo) {
    const results = [];
    document.getElementById(tipo + 's').querySelectorAll('.entry').forEach(entry => {
      const cidade = entry.querySelector('input[id$="_cidade"]')?.value.trim();
      const uf = entry.querySelector('input[id$="_uf"]')?.value.trim().toUpperCase();
      if (cidade && uf) results.push(`${cidade.toUpperCase()}-${uf}`);
    });
    return results;
  }
  function gerar() {
    const pedido = document.getElementById('pedido').value.trim().toUpperCase();
    const valor = document.getElementById('valor').value.trim();
    const coletas = getValues('coleta');
    const entregas = getValues('entrega');
    if (!pedido) { alert('Preencha o número do pedido'); return; }
    if (!valor) { alert('Preencha o valor'); return; }
    if (!coletas.length) { alert('Preencha pelo menos uma coleta'); return; }
    if (!entregas.length) { alert('Preencha pelo menos uma entrega'); return; }
    const linha = `Pedido: ${pedido}\nValor: R$ ${valor}\nColeta: ${coletas.join(' / ')}\nEntrega: ${entregas.join(' / ')}`;
    document.getElementById('result-text').textContent = linha;
    const box = document.getElementById('result-box');
    box.classList.add('show');
    document.getElementById('copy-btn').textContent = '📋 Copiar para o WhatsApp';
    document.getElementById('copy-btn').classList.remove('copied');
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    document.getElementById('btn-enviar').classList.add('show');
  }
  function copiar() {
    navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ Copiado!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copiar para o WhatsApp'; btn.classList.remove('copied'); }, 2500);
    });
  }
  addEntry('coleta'); addEntry('entrega');

  const WEBHOOK_PEDIDOS = 'https://hook.us2.make.com/yjj9qddmtguygs9ete1ccrddd6k3tdan';
  
  // Pega o nome da vendedora pela URL
  const urlParams = new URLSearchParams(window.location.search);
  const VENDEDORA = urlParams.get('v') ? urlParams.get('v').toUpperCase() : null;

  // Mostra nome da vendedora no topo se identificada
  if (VENDEDORA) {
    const badge = document.querySelector('.badge');
    if (badge) badge.innerHTML = '🚛 Gerador de Pedido — <strong>' + VENDEDORA + '</strong>';
  }
  let dadosParaEnviar = null;

  // Show enviar button after gerar
  function abrirModal() {
    const texto = document.getElementById('result-text').textContent;
    if (!texto) return;
    
    // Parse dados do texto gerado
    const lines = texto.split('\n');
    dadosParaEnviar = {};
    lines.forEach(line => {
      const [key, ...rest] = line.split(': ');
      dadosParaEnviar[key.trim()] = rest.join(': ').trim();
    });

    document.getElementById('modal-data').textContent = texto;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function fecharModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    const btn = document.getElementById('modal-confirm');
    btn.textContent = '✓ Confirmar';
    btn.classList.remove('loading');
  }

  async function enviarSistema() {
    const btn = document.getElementById('modal-confirm');
    btn.textContent = 'Enviando...';
    btn.classList.add('loading');

    try {
      const formData = new URLSearchParams();
      formData.append('Pedido', dadosParaEnviar['Pedido'] || '');
      formData.append('Vendedora', VENDEDORA || '');
      formData.append('Valor', dadosParaEnviar['Valor'] || '');
      formData.append('Coleta', dadosParaEnviar['Coleta'] || '');
      formData.append('Entrega', dadosParaEnviar['Entrega'] || '');

      await fetch(WEBHOOK_PEDIDOS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString(),
        mode: 'no-cors'
      });

      document.getElementById('modal-content').innerHTML = `
        <div class="modal-success">
          <div class="icon">✅</div>
          <p>Pedido enviado com sucesso!</p>
          <p style="color:var(--muted);font-size:12px;margin-top:6px;">Os dados foram salvos no sistema.</p>
        </div>
        <div class="modal-btns" style="margin-top:16px">
          <button class="modal-confirm" style="grid-column:span 2" onclick="fecharModalReset()">Fechar</button>
        </div>`;
    } catch(err) {
      btn.textContent = '✓ Confirmar';
      btn.classList.remove('loading');
      alert('Erro ao enviar. Tente novamente.');
    }
  }

  function fecharModalReset() {
    fecharModal();
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-title">Confirmar envio</div>
      <div class="modal-subtitle">Revise os dados antes de enviar para o sistema:</div>
      <div class="modal-data" id="modal-data"></div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="fecharModal()">✕ Cancelar</button>
        <button class="modal-confirm" id="modal-confirm" onclick="enviarSistema()">✓ Confirmar</button>
      </div>`;
  }
</script>
</body>
</html>
